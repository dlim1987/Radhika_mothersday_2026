*{box-sizing:border-box}html,body{margin:0;padding:0;min-height:100%}body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2) 45%,var(--bg3));color:var(--ink);overflow-x:hidden}.app{max-width:780px;margin:0 auto;min-height:100dvh;padding:12px;display:flex;flex-direction:column;gap:12px}.top{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.chip{background:var(--panel);padding:8px 12px;border-radius:999px;border:1px solid var(--border);box-shadow:var(--shadow);font-size:13px;color:var(--muted);font-weight:800}.stage{position:relative;flex:1;border:1px solid var(--border);box-shadow:var(--shadow);border-radius:28px;overflow:hidden;min-height:78dvh}.scene-bg{position:absolute;inset:0;transition:.35s ease}.inner{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;gap:12px;padding:14px}.panel{background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:24px;padding:16px}h1,h2,h3{margin:0;font-family:'Baloo 2',cursive;line-height:1.04}h1{font-size:clamp(2rem,6vw,3.2rem)}h2{font-size:clamp(1.35rem,4vw,2rem)}p{margin:0;line-height:1.6}.hero{display:grid;gap:14px;align-content:center;min-height:100%}.subtitle{color:var(--muted)}.btns,.choices,.grid2{display:grid;gap:10px}.btns{grid-template-columns:1fr}.grid2{grid-template-columns:repeat(2,1fr)}button{border:none;border-radius:18px;min-height:52px;padding:13px 16px;font:inherit;font-weight:800;cursor:pointer;box-shadow:0 10px 20px rgba(0,0,0,.08)}.primary{background:linear-gradient(135deg,var(--pink),var(--coral));color:#fff}.secondary{background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff}.gold{background:linear-gradient(135deg,#ffd86b,#ffb703);color:#533600}.green{background:linear-gradient(135deg,#8de88a,#38b96e);color:#10391e}.ghost{background:#fff;color:var(--ink)}.cast{display:flex;justify-content:center;align-items:flex-end;gap:12px;flex-wrap:wrap;min-height:220px;padding:10px 10px 24px;border-radius:26px;background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,.08))}.avatar{position:relative;width:116px;height:164px;transform:translateY(-6px)}.avatar.small{width:94px;height:136px}.avatar.large{width:132px;height:182px}.label{position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);background:rgba(255,255,255,.95);padding:5px 9px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap;box-shadow:0 8px 16px rgba(0,0,0,.08)}.dialogue{display:grid;gap:8px}.speaker{font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:900;color:var(--muted)}.photo{width:100%;border-radius:18px;border:3px solid rgba(255,255,255,.8);max-height:420px;object-fit:cover;box-shadow:0 14px 28px rgba(0,0,0,.12)}.gallery-photo{max-height:62dvh}.score{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:14px;color:var(--muted);font-weight:800}.progress{height:10px;border-radius:999px;background:rgba(255,255,255,.7);overflow:hidden}.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--pink),var(--gold));transition:width .2s ease}.footer{text-align:center;color:var(--muted);font-size:13px;padding-bottom:10px}.hidden{display:none!important}.story-card{max-height:50dvh;overflow:auto;padding-right:6px}.minicanvas{width:100%;background:linear-gradient(180deg,#eefaff,#fff8ef);border-radius:22px;border:2px solid rgba(123,92,255,.14);display:block;touch-action:none}.note{font-size:12px;color:var(--muted)}.mini-head{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.letter{white-space:pre-line}.gallery-box{text-align:center}.caption{font-weight:800;font-size:1.05rem}.thumb-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.thumb-grid img{width:100%;height:150px;object-fit:cover;border-radius:16px;border:3px solid rgba(255,255,255,.8)}@media (max-width:640px){.grid2{grid-template-columns:1fr}.avatar{width:98px;height:142px}.avatar.small{width:82 <script>

var GALLERY=[

var themes={intro:'linear-gradient(180deg,#ffe4ef 0%,#fff4d6 45%,#dff7ff 100%)',home:'linear-gradient(180deg,#97d4ff 0%,#edf9ff 46%,#fff1d8 100%)',warm:'linear-gradient(180deg,#ffd2bc 0%,#ffe8cb 52%,#fff8e7 100%)',ending:'linear-gradient(180deg,#ffd9ea 0%,#f6e2ff 46%,#e0f8ff 100%)'};
var musicCtx=null,musicLoop=null;
function setTheme(name){bg.style.background=themes[name]||themes.intro}
function setTop(c,s){chapter.textContent=c;statusChip.textContent=s}
function startMusic(){try{var C=window.AudioContext||window.webkitAudioContext;if(!C)return;if(!musicCtx)musicCtx=new C();if(musicCtx.state==='suspended')musicCtx.resume();if(musicLoop)return;function pianoNote(freq,start,dur,vol){var osc=musicCtx.createOscillator();var gain=musicCtx.createGain();var low=musicCtx.createBiquadFilter();low.type='lowpass';low.frequency.value=1700;osc.type='triangle';osc.frequency.value=freq;osc.connect(low);low.connect(gain);gain.connect(musicCtx.destination);gain.gain.setValueAtTime(0.0001,start);gain.gain.linearRampToValueAtTime(vol,start+0.025);gain.gain.exponentialRampToValueAtTime(Math.max(0.02,vol*0.45),start+0.20);gain.gain.exponentialRampToValueAtTime(0.0001,start+dur);osc.start(start);osc.stop(start+dur+0.03)}function phrase(){var now=musicCtx.currentTime+0.05;var seq=[[261.63,0.0,1.8,0.05],[329.63,0.55,1.5,0.035],[392.00,1.1,1.5,0.035],[329.63,1.7,1.4,0.03],[293.66,3.0,1.6,0.04],[392.00,3.65,1.6,0.04],[440.00,4.35,1.4,0.03],[392.00,5.0,1.8,0.04],[329.63,6.6,1.8,0.04],[392.00,7.2,1.5,0.032],[523.25,7.9,1.8,0.032],[392.00,8.7,1.5,0.03],[293.66,10.2,1.8,0.04],[349.23,10.9,1.5,0.03],[440.00,11.6,1.5,0.03],[349.23,12.3,1.7,0.03],[261.63,14.0,2.1,0.05],[329.63,14.8,1.7,0.03],[392.00,15.6,1.7,0.03],[329.63,16.4,1.5,0.028],[293.66,18.0,1.8,0.038],[392.00,18.8,1.8,0.038],[329.63,19.7,1.5,0.03],[261.63,20.6,2.6,0.045]];for(var i=0;i<seq.length;i++){pianoNote(seq[i][0],now+seq[i][1],seq[i][2],seq[i][3])}}phrase();musicLoop=setInterval(phrase,24000)}catch(e){}}
function bark(){try{var C=window.AudioContext||window.webkitAudioContext;if(!C)return;var ctx=new C();var buffer=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.16),ctx.sampleRate);var data=buffer.getChannelData(0);for(var i=0;i<data.length;i++){var t=i/data.length;data[i]=(Math.random()*2-1)*(1-t)*0.26}var src=ctx.createBufferSource();var band=ctx.createBiquadFilter();band.type='bandpass';band.frequency.value=720;band.Q.value=1.1;var gain=ctx.createGain();gain.gain.setValueAtTime(0.001,ctx.currentTime);gain.gain.linearRampToValueAtTime(0.16,ctx.currentTime+0.02);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.16);src.buffer=buffer;src.connect(band);band.connect(gain);gain.connect(ctx.destination);src.start();src.stop(ctx.currentTime+0.16)}catch(e){}}
function photoHTML(src,alt,extra){return '<img class="photo '+(extra||'')+'" src="'+src+'" alt="'+alt+'" onerror="this.outerHTML=\'<div data-fallback=\\\"1\\\" style=\\\"background:rgba(255,255,255,.95);border:1px solid rgba(255,255,255,.72);box-shadow:0 16px 44px rgba(101,55,132,.18);border-radius:24px;padding:16px;\\\"><p><strong></strong></p><p style=\\\"font-size:12px;color:#705f7b;\\\"></p></div>\'">'}
function avatar(person,extra){var cls=extra?('avatar '+extra):'avatar';var map={radhika:'<svg viewBox="0 0 116 164" class="'+cls+'"><ellipse cx="58" cy="154" rx="30" ry="8" fill="rgba(0,0,0,.08)"/><path d="M26 64c0-28 14-46 32-46 20 0 34 20 34 46v54H26z" fill="#1b1930"/><path d="M35 111c8-8 37-10 46 0v34H35z" fill="#6f6cff"/><ellipse cx="58" cy="58" rx="25" ry="29" fill="#d4a07e"/><path d="M33 50c3-19 16-31 25-31 18 0 30 11 33 32" stroke="#111021" stroke-width="8" stroke-linecap="round" fill="none"/><path d="M29 53c-6 17-3 39 0 44" stroke="#111021" stroke-width="8" stroke-linecap="round" fill="none"/><path d="M89 53c6 17 3 39 0 44" stroke="#111021" stroke-width="8" stroke-linecap="round" fill="none"/><circle cx="48" cy="57" r="2.7" fill="#2d2438"/><circle cx="68" cy="57" r="2.7" fill="#2d2438"/><path d="M49 70c6 4 12 4 18 0" stroke="#9c5e56" stroke-width="2.4" stroke-linecap="round" fill="none"/><path d="M41 86c10 9 25 9 35 0" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/><text x="58" y="22" text-anchor="middle" font-size="15">✨</text><foreignObject x="0" y="146" width="116" height="20"><div xmlns="http://www.w3.org/1999/xhtml" class="label">Mamma</div></foreignObject></svg>',leya:'<svg viewBox="0 0 116 164" class="'+cls+' small"><ellipse cx="58" cy="154" rx="26" ry="8" fill="rgba(0,0,0,.08)"/><path d="M28 84c0-18 14-29 30-29s30 11 30 29v40H28z" fill="#ffd3e9"/><ellipse cx="58" cy="61" rx="24" ry="26" fill="#e2b08c"/><path d="M28 57c1-20 12-31 24-33 13-2 27 4 34 16 2 4 4 9 4 15" fill="#2b1b18"/><path d="M32 58c1-8 4-15 9-20" stroke="#2b1b18" stroke-width="6" stroke-linecap="round" fill="none"/><path d="M72 36c7 4 12 12 13 22" stroke="#2b1b18" stroke-width="6" stroke-linecap="round" fill="none"/><circle cx="49" cy="61" r="2.6" fill="#2d2438"/><circle cx="67" cy="61" r="2.6" fill="#2d2438"/><path d="M50 73c5 4 11 4 16 0" stroke="#9c5e56" stroke-width="2.2" fill="none" stroke-linecap="round"/><path d="M43 89c9 7 21 7 30 0" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/><text x="58" y="25" text-anchor="middle" font-size="18">👑</text><foreignObject x="0" y="146" width="116" height="20"><div xmlns="http://www.w3.org/1999/xhtml" class="label">Leya</div></foreignObject></svg>',kai:'<svg viewBox="0 0 116 164" class="'+cls+' small"><ellipse cx="58" cy="154" rx="26" ry="8" fill="rgba(0,0,0,.08)"/><path d="M28 84c0-18 14-29 30-29s30 11 30 29v40H28z" fill="#ffb703"/><ellipse cx="58" cy="61" rx="24" ry="26" fill="#d39b73"/><path d="M38 51c6-14 21-22 37-10" stroke="#34251d" stroke-width="8" stroke-linecap="round" fill="none"/><circle cx="49" cy="61" r="2.6" fill="#2d2438"/><circle cx="67" cy="61" r="2.6" fill="#2d2438"/><path d="M50 73c5 4 11 4 16 0" stroke="#9c5e56" stroke-width="2.2" fill="none" stroke-linecap="round"/><path d="M43 89c9 7 21 7 30 0" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/><text x="86" y="106" text-anchor="middle" font-size="22">🏀</text><foreignObject x="0" y="146" width="116" height="20"><div xmlns="http://www.w3.org/1999/xhtml" class="label">Kai</div></foreignObject></svg>',happi:'<svg viewBox="0 0 116 132" class="'+cls+' small"><ellipse cx="58" cy="120" rx="26" ry="8" fill="rgba(0,0,0,.08)"/><path d="M28 62c0-17 13-26 30-26s30 9 30 26v24H28z" fill="#efc98f"/><ellipse cx="58" cy="50" rx="25" ry="21" fill="#f4ddb5"/><ellipse cx="39" cy="45" rx="8" ry="14" fill="#d6ac76"/><ellipse cx="77" cy="45" rx="8" ry="14" fill="#d6ac76"/><circle cx="49" cy="50" r="2.4" fill="#2d2438"/><circle cx="67" cy="50" r="2.4" fill="#2d2438"/><circle cx="58" cy="59" r="3.3" fill="#5d4037"/><path d="M54 65c2 3 6 3 8 0" stroke="#7b5a46" stroke-width="2" fill="none" stroke-linecap="round"/><foreignObject x="0" y="112" width="116" height="20"><div xmlns="http://www.w3.org/1999/xhtml" class="label">Happi</div></foreignObject></svg>',lim:'<svg viewBox="0 0 132 182" class="'+cls+' large"><ellipse cx="66" cy="170" rx="34" ry="9" fill="rgba(0,0,0,.08)"/><path d="M30 88c0-22 16-36 36-36s36 14 36 36v50H30z" fill="#6a84a8"/><ellipse cx="66" cy="62" rx="27" ry="29" fill="#cd9673"/><path d="M44 50c10-15 34-21 46-6" stroke="#2c201e" stroke-width="8" stroke-linecap="round" fill="none"/><circle cx="56" cy="62" r="2.8" fill="#2d2438"/><circle cx="76" cy="62" r="2.8" fill="#2d2438"/><path d="M57 75c6 4 12 4 18 0" stroke="#9c5e56" stroke-width="2.4" fill="none" stroke-linecap="round"/><path d="M49 92c10 8 25 8 35 0" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/><foreignObject x="0" y="162" width="132" height="20"><div xmlns="http://www.w3.org/1999/xhtml" class="label">Papa Lim</div></foreignObject></svg>'};return map[person]}
function intro(){setTheme('intro');setTop("Mother's Day Adventure",'Ready');app.innerHTML='<section class="panel hero"><div class="chip" style="justify-self:center;background:linear-gradient(135deg,var(--pink),var(--blue));color:white">A gift for Radhika</div><h1>Mamma\'s Mother\'s Day Adventure</h1><p>Happy mother\'s day! Thank you for all that you do day in day out. We love you!</p><p class="subtitle"></p><div class="cast">'+avatar('radhika')+avatar('leya')+avatar('kai')+avatar('happi')+avatar('lim')+'</div><div class="btns"><button class="primary" id="start">Start Adventure</button></div></section>';document.getElementById('start').onclick=function(){startMusic();homeChoice()}}
function homeChoice(){setTheme('home');setTop('Choose the next moment','Choose who to play with');app.innerHTML='<div class="cast">'+avatar('leya')+avatar('kai')+avatar('happi')+'</div><section class="panel dialogue"><p>Mamma comes downstairs and finds Leya, Kai and Happi all lined up, waiting for her. Who should she play with first?</p></section><section class="panel choices"><h2>Choose what happens next</h2><div class="grid2"><button class="gold" id="kaiChoice">Play with Kai</button><button class="primary" id="leyaChoice">Tell stories to Leya</button><button class="green" id="happiChoice">Play with Happi</button><button class="secondary" id="letterChoice">Letter to Mamma</button><button class="ghost" id="limChoice">Find Papa Lim</button></div></section>';document.getElementById('kaiChoice').onclick=kaiIntro;document.getElementById('leyaChoice').onclick=leyaIntro;document.getElementById('happiChoice').onclick=happiIntro;document.getElementById('letterChoice').onclick=letterToMamma;document.getElementById('limChoice').onclick=limMoment}
function letterToMamma(){setTheme('ending');setTop('Letter to Mamma','A special message for Radhika');app.innerHTML='<section class="panel"><h2>Letter to Mamma</h2>'+photoHTML(ASSET.letter,'Family photo above special letter')+'<div class="letter" style="margin-top:12px"><p><strong>Dear Mamma,</strong></p><p>Happy Mama Day! Today is your special day. We love you sooo much. You take us to school, you let us ride bikes and scooters, do flips in gym, and go see new cities. You give us hugs, cuddles, tickles, and kisses every day. We are happy you are our mama.</p><p>Love, Leya, Kai, Happi (and Papa Lim)</p></div><div class="btns" style="margin-top:14px"><button class="primary" id="openGallery">Open photo memories</button><button class="ghost" id="backHomeLetter">Back to family choices</button></div></section>';document.getElementById('openGallery').onclick=function(){photoGallery(0)};document.getElementById('backHomeLetter').onclick=homeChoice}
function photoGallery(i){setTheme('ending');setTop('Letter to Mamma','Photo memory '+(i+1)+' of '+GALLERY.length);var item=GALLERY[i];var prev=i>0?'<button class="ghost" id="prevPhoto">Previous photo</button>':'';var next=i<GALLERY.length-1?'<button class="primary" id="nextPhoto">Next photo</button>':'<button class="primary" id="finishGallery">Back to letter</button>';app.innerHTML='<section class="panel gallery-box"><div class="speaker">Memory Gallery</div><h2 style="margin-bottom:8px">Photo '+(i+1)+' of '+GALLERY.length+'</h2>'+photoHTML(item.src,'Gallery photo '+(i+1),'gallery-photo')+'<p class="caption" style="margin-top:12px">'+item.cap+'</p><div class="btns" style="margin-top:14px">'+prev+next+'<button class="secondary" id="allThumbs">See all photos</button><button class="ghost" id="exitGallery">Back to family choices</button></div></section>';if(i>0)document.getElementById('prevPhoto').onclick=function(){photoGallery(i-1)};if(i<GALLERY.length-1)document.getElementById('nextPhoto').onclick=function(){photoGallery(i+1)};else document.getElementById('finishGallery').onclick=letterToMamma;document.getElementById('allThumbs').onclick=allPhotosReview;document.getElementById('exitGallery').onclick=homeChoice}
function allPhotosReview(){setTheme('ending');setTop('Photo Review','All gallery and mini-game reveal photos');var thumbs='';for(var i=0;i<GALLERY.length;i++){thumbs+='<div class="panel" style="padding:10px"><img src="'+GALLERY[i].src+'" alt="Gallery thumbnail '+(i+1)+'" onerror="this.style.display=\'none\'"/><p class="note" style="margin-top:6px"><strong>'+(i+1)+'.</strong> '+GALLERY[i].cap+'</p></div>'}app.innerHTML='<section class="panel"><h2>All Photo Memories</h2><p>This review page shows the full Letter to Mamma gallery plus the mini-game photo reveals below.</p><div class="thumb-grid" style="margin-top:12px">'+thumbs+'</div></section><section class="panel"><h2>Kai mini-game photo reveals</h2><div class="thumb-grid" style="margin-top:12px">'+photoHTML(ASSET.kai[0],'Kai reveal 1')+photoHTML(ASSET.kai[1],'Kai reveal 2')+photoHTML(ASSET.kai[2],'Kai reveal 3')+photoHTML(ASSET.kai[3],'Kai reveal 4')+'</div></section><section class="panel"><h2>Happi mini-game photo reveals</h2><div class="thumb-grid" style="margin-top:12px">'+photoHTML(ASSET.happi[0],'Happi reveal 1')+photoHTML(ASSET.happi[1],'Happi reveal 2')+'</div></section><section class="panel btns"><button class="primary" id="backLetter">Back to Letter to Mamma</button><button class="ghost" id="backFamily">Back to family choices</button></section>';document.getElementById('backLetter').onclick=letterToMamma;document.getElementById('backFamily').onclick=homeChoice}
function kaiIntro(){setTop('Kai Route','Choose the basketball mode');app.innerHTML='<div class="cast">'+avatar('radhika')+avatar('kai')+'</div><section class="panel dialogue"><div class="speaker">Kai</div><p>“Basketball! Basketball! Basketball!” Kai grabs the ball and looks at Mamma with the biggest smile. Should Mamma play solo, or should Kai join in too?</p></section><section class="panel btns"><button class="gold" id="soloKai">Single player</button><button class="secondary" id="duoKai">2 players</button><button class="ghost" id="backHome">Go back to the family choices</button></section>';document.getElementById('soloKai').onclick=function(){basketballGame('solo')};document.getElementById('duoKai').onclick=function(){basketballGame('duo')};document.getElementById('backHome').onclick=homeChoice}

function basketballGame(mode){setTheme('warm');setTop('Mini-Game • Kai Basketball',mode==='solo'?'Single player':'2 players');var header=mode==='solo'?'<span id="score">0 / 8 baskets</span><span id="timer">Time: 0.0s</span>':'<span id="turn">Current player: Mamma</span><span id="timerA">Mamma: 0.0s</span><span id="timerB">Kai: 0.0s</span>';var desc=mode==='solo'?'Score 8 baskets as fast as you can.':'Mamma and Kai each take a turn to score 8 baskets. Shortest time wins.';app.innerHTML='<section class="panel"><div class="mini-head"><h2>Kai\'s Basketball Game</h2><div class="note">'+desc+'</div></div><p>Drag the ball backwards to set power and aim, then release. A dotted guide line appears while aiming.</p><div class="progress"><span id="prog"></span></div><div class="score">'+header+'</div><canvas id="ballCanvas" class="minicanvas" width="640" height="430"></canvas><div id="photos" class="choices" style="margin-top:12px"></div><div class="btns" style="margin-top:12px"><button class="primary" id="toEndingKai">Continue to the ending</button><button class="ghost" id="exitKai">Exit</button></div></section>';var cv=document.getElementById('ballCanvas');var c=cv.getContext('2d');var prog=document.getElementById('prog');var photos=document.getElementById('photos');var drag=null;var ball={x:120,y:345,r:24,vx:0,vy:0,moving:false,scored:false};var players=mode==='solo'?[{name:'Mamma',score:0,start:performance.now(),done:false,time:null}]:[{name:'Mamma',score:0,start:performance.now(),done:false,time:null},{name:'Kai',score:0,start:null,done:false,time:null}];var current=0;var shown=[false,false,false,false];var board={x:560,y:48,w:10,h:160};var rim={x:450,y:122,w:120,h:6};var scoreZone={x:468,y:118,w:106,h:136};var lastY=345;function cp(){return players[current]}function updateHUD(){if(mode==='solo'){document.getElementById('score').textContent=players[0].score+' / 8 baskets';var t=((players[0].done?players[0].time:(performance.now()-players[0].start))/1000).toFixed(1);document.getElementById('timer').textContent='Time: '+t+'s';prog.style.width=(players[0].score/8*100)+'%'}else{document.getElementById('turn').textContent='Current player: '+cp().name;var a=players[0].time!==null?(players[0].time/1000).toFixed(1):(players[0].start?((performance.now()-players[0].start)/1000).toFixed(1):'0.0');var b=players[1].time!==null?(players[1].time/1000).toFixed(1):(players[1].start?((performance.now()-players[1].start)/1000).toFixed(1):'0.0');document.getElementById('timerA').textContent='Mamma: '+a+'s';document.getElementById('timerB').textContent='Kai: '+b+'s';prog.style.width=(((players[0].score+players[1].score)/16)*100)+'%'}}function maybeReveal(){if(mode==='solo'){if(players[0].score===4&&!shown[0]){shown[0]=true;photos.innerHTML+=photoHTML(ASSET.kai[0],'Kai solo reveal 1')}if(players[0].score===8&&!shown[1]){shown[1]=true;photos.innerHTML+=photoHTML(ASSET.kai[1],'Kai solo reveal 2')}}else{if(players[0].score===4&&!shown[0]){shown[0]=true;photos.innerHTML+=photoHTML(ASSET.kai[0],'Mamma round reveal 1')}if(players[0].score===8&&!shown[1]){shown[1]=true;photos.innerHTML+=photoHTML(ASSET.kai[1],'Mamma round reveal 2')}if(players[1].score===4&&!shown[2]){shown[2]=true;photos.innerHTML+=photoHTML(ASSET.kai[2],'Kai round reveal 1')}if(players[1].score===8&&!shown[3]){shown[3]=true;photos.innerHTML+=photoHTML(ASSET.kai[3],'Kai round reveal 2')}}}function resetBall(){ball.x=120;ball.y=345;ball.vx=0;ball.vy=0;ball.moving=false;ball.scored=false;lastY=ball.y}function finishTurnIfNeeded(){var p=cp();if(p.score>=8&&!p.done){p.done=true;p.time=performance.now()-p.start;if(mode==='duo'&&current===0){current=1;players[1].start=performance.now();resetBall()}else if(mode==='duo'&&current===1){var winner=players[0].time<=players[1].time?'Mamma':'Kai';photos.innerHTML+='<div class="panel"><p><strong>'+winner+' wins!</strong></p><p class="note">Mamma: '+(players[0].time/1000).toFixed(1)+'s • Kai: '+(players[1].time/1000).toFixed(1)+'s</p></div>'}}}function scoreBasket(){if(ball.scored)return;ball.scored=true;cp().score+=1;maybeReveal();finishTurnIfNeeded();setTimeout(resetBall,240)}function drawGuide(x1,y1,vx,vy){c.setLineDash([6,8]);c.strokeStyle='rgba(45,35,65,.45)';c.lineWidth=3;c.beginPath();c.moveTo(x1,y1);var px=x1,py=y1,tvx=vx,tvy=vy;for(var i=0;i<18;i++){px+=tvx*4;py+=tvy*4;tvy+=0.45*4;c.lineTo(px,py)}c.stroke();c.setLineDash([])}function collideRect(rect){return ball.x+ball.r>rect.x&&ball.x-ball.r<rect.x+rect.w&&ball.y+ball.r>rect.y&&ball.y-ball.r<rect.y+rect.h}function draw(){c.clearRect(0,0,640,430);c.fillStyle='#dff2ff';c.fillRect(0,0,640,430);c.fillStyle='#f2dfbf';c.fillRect(0,360,640,70);c.fillStyle='#ffffff';c.fillRect(board.x,board.y,board.w,board.h);c.strokeStyle='#d74136';c.lineWidth=4;c.strokeRect(498,80,58,42);c.fillStyle='#f57c00';c.fillRect(rim.x,rim.y,rim.w,rim.h);if(drag){var dx=ball.x-drag.x,dy=ball.y-drag.y;drawGuide(ball.x,ball.y,dx*0.08,dy*0.08);c.strokeStyle='rgba(45,35,65,.55)';c.lineWidth=4;c.beginPath();c.moveTo(ball.x,ball.y);c.lineTo(drag.x,drag.y);c.stroke()}c.fillStyle='#f57c00';c.beginPath();c.arc(ball.x,ball.y,ball.r,0,Math.PI*2);c.fill();c.strokeStyle='#6d4c41';c.lineWidth=3;c.stroke();updateHUD();if(ball.moving){lastY=ball.y;ball.x+=ball.vx;ball.y+=ball.vy;ball.vy+=0.45;if(ball.y>346){resetBall()}else{var crossedDown=lastY<=scoreZone.y&&ball.y>=scoreZone.y;var withinHoop=ball.x>scoreZone.x&&ball.x<scoreZone.x+scoreZone.w&&ball.vy>0;if(!ball.scored&&withinHoop&&(crossedDown||ball.y>scoreZone.y&&ball.y<scoreZone.y+scoreZone.h)){scoreBasket()}else{if(collideRect(board)&&ball.vx>0){ball.x=board.x-ball.r;ball.vx=-Math.abs(ball.vx)*0.35;ball.vy*=0.98}if(collideRect(rim)&&ball.vy>0&&ball.y<rim.y+2&&(ball.x<scoreZone.x-18||ball.x>scoreZone.x+scoreZone.w+18)){ball.y=rim.y-ball.r;ball.vy=-Math.abs(ball.vy)*0.05;ball.vx*=0.998}}}}requestAnimationFrame(draw)}function pos(e){var r=cv.getBoundingClientRect();return{x:(e.clientX-r.left)*cv.width/r.width,y:(e.clientY-r.top)*cv.height/r.height}}cv.addEventListener('pointerdown',function(e){var p=pos(e);if(Math.hypot(p.x-ball.x,p.y-ball.y)<32&&!ball.moving){drag=p}});cv.addEventListener('pointermove',function(e){if(drag)drag=pos(e)});cv.addEventListener('pointerup',function(e){if(!drag)return;var p=pos(e);var dx=ball.x-p.x,dy=ball.y-p.y;ball.vx=dx*0.08;ball.vy=dy*0.08;ball.moving=true;drag=null});draw();document.getElementById('toEndingKai').onclick=ending;document.getElementById('exitKai').onclick=homeChoice}
function happiGame(){setTheme('home');setTop('Mini-Game • Happi Fetch','Drag and release the toy');app.innerHTML='<section class="panel"><h2>Happi\'s Fetch Game</h2><p>Drag and release the toy so Happi can chase it, collect it, and bring it back. Happi gives a little bark after each throw.</p><div class="progress"><span id="prog"></span></div><div class="score"><span id="score">0 / 8 fetches</span><span>Photo reveals at 4 and 8</span></div><canvas id="dogCanvas" class="minicanvas" width="640" height="430"></canvas><div id="photos" class="choices" style="margin-top:12px"></div><div class="btns" style="margin-top:12px"><button class="primary" id="toEndingHappi">Continue to the ending</button><button class="ghost" id="exitHappi">Exit</button></div></section>';var cv=document.getElementById('dogCanvas');var c=cv.getContext('2d');var prog=document.getElementById('prog');var scoreEl=document.getElementById('score');var photos=document.getElementById('photos');var count=0,shown4=false;var drag=null;var toy={x:120,y:346,vx:0,vy:0,moving:false};var happi={x:500,y:346,state:'idle',target:500};function round(x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.fill()}function drawHappi(x,y){c.fillStyle='#efc98f';round(x-30,y-20,60,26,10);c.fillStyle='#f4ddb5';round(x-24,y-40,48,28,12);c.fillStyle='#d6ac76';c.beginPath();c.ellipse(x-18,y-34,8,14,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(x+18,y-34,8,14,0,0,Math.PI*2);c.fill();c.fillStyle='#2d2438';c.beginPath();c.arc(x-8,y-30,2.5,0,Math.PI*2);c.fill();c.beginPath();c.arc(x+8,y-30,2.5,0,Math.PI*2);c.fill();c.fillStyle='#5d4037';c.beginPath();c.arc(x,y-22,3.4,0,Math.PI*2);c.fill()}function draw(){c.clearRect(0,0,640,430);c.fillStyle='#dff6cf';c.fillRect(0,0,640,430);c.fillStyle='#90d36b';c.fillRect(0,360,640,70);if(drag){c.strokeStyle='rgba(45,35,65,.55)';c.lineWidth=4;c.beginPath();c.moveTo(toy.x,toy.y);c.lineTo(drag.x,drag.y);c.stroke()}c.fillStyle='#2ec4b6';c.fillRect(toy.x-16,toy.y-6,28,12);c.fillStyle='#0f766e';c.fillRect(toy.x+10,toy.y-14,10,28);drawHappi(happi.x,happi.y);if(toy.moving){toy.x+=toy.vx;toy.y+=toy.vy;toy.vx*=.99;toy.vy+=.33;if(toy.y>346){toy.y=346;toy.moving=false;happi.state='fetch';happi.target=toy.x}}if(happi.state==='fetch'){if(Math.abs(happi.x-happi.target)>3){happi.x+=Math.sign(happi.target-happi.x)*4}else{happi.state='return'}}if(happi.state==='return'){toy.x=happi.x;toy.y=happi.y-24;if(happi.x>120){happi.x-=4}else{happi.state='idle';toy.x=120;toy.y=346;count++;scoreEl.textContent=count+' / 8 fetches';prog.style.width=(count/8*100)+'%';if(count===4&&!shown4){shown4=true;photos.innerHTML+=photoHTML(ASSET.happi[0],'Happi memory reveal')}if(count===8){photos.innerHTML+=photoHTML(ASSET.happi[1],'Happi second memory reveal')}}}requestAnimationFrame(draw)}function pos(e){var r=cv.getBoundingClientRect();return{x:(e.clientX-r.left)*cv.width/r.width,y:(e.clientY-r.top)*cv.height/r.height}}cv.addEventListener('pointerdown',function(e){var p=pos(e);if(Math.hypot(p.x-toy.x,p.y-toy.y)<34&&!toy.moving&&happi.state==='idle'){drag=p}});cv.addEventListener('pointermove',function(e){if(drag)drag=pos(e)});cv.addEventListener('pointerup',function(e){if(!drag)return;var p=pos(e);var dx=toy.x-p.x,dy=toy.y-p.y;toy.vx=dx*0.07;toy.vy=dy*0.06;toy.moving=true;drag=null;bark()});draw();document.getElementById('toEndingHappi').onclick=ending;document.getElementById('exitHappi').onclick=homeChoice}
function makeStory(type){var stories={castle:'Once upon a time, there was a kind little girl named Leya who lived in a bright house filled with hugs, laughter and the smell of yummy snacks. Every morning, Mamma helped everyone get ready, and every evening Papa made sure the family stayed safe, cosy and together. Leya loved adventures, but sometimes she wanted everything to happen right away. One sunny day, she imagined that her house had turned into a moonlit castle. The stairs became silver steps, the sofa became a royal boat, and the kitchen became a shining hall. As Leya explored, she found a basket of glowing apples and wanted to keep the biggest ones. Then she remembered what Mamma always says: sharing makes happy things even happier. So she gave one apple to Kai, one to Happi, and one to Mamma and Papa too. Soon everyone was smiling. Later they came to a windy bridge over a sparkling river. A sign said, Only families who listen carefully may cross. Leya wanted to rush ahead, but Papa gently reminded her to stop, look and listen. She listened to Mamma and Papa, held the rail, and crossed safely with her family close beside her. On the other side they found a treasure chest full of kind notes instead of gold. The notes said things like Thank you for sharing, Thank you for helping, and Thank you for listening. Leya realised that the best treasure is a warm and loving family. When she came home from the castle adventure, she knew that the brightest magic of all was kindness, sharing and listening hearts.',dog:'Once upon a time, Leya became the leader of a wonderful family expedition. Her team included Kai, Happi, wise Mamma and strong Papa. Early one morning they set off through a golden forest to find the Meadow of Morning Bells. At first the path was wide and lovely, but soon it split into three different directions. Leya wanted to dash down the shiniest way because it looked exciting. Happi barked softly and sat very still. Mamma knelt beside Leya and said, Sometimes the best path is not the flashiest one. First we pause, then we listen. Papa looked carefully at the ground and spotted tiny paw prints on the quieter trail. Because Leya listened to Mamma and Papa, the family followed Happi and found the right path. Along the way they met a little bird who had dropped all her berries. Kai rushed to help, and Leya joined him. Together they shared their time and hands, filling the basket until the bird chirped with joy. Leya felt proud, not because she was fastest, but because she was kind. At last the family reached the Meadow of Morning Bells. The bells only rang when families stood close, spoke gently and listened with love. Mamma held Leya\'s hand, Papa stood beside Kai, and Happi sat neatly in the middle. When everyone was calm and together, the bells rang like soft music in the morning air. Leya smiled because she understood the secret. The best adventures are the ones where family helps each other, shares with others, and listens carefully to the people who love them.',basket:'Once upon a time, Leya and Kai found a bouncing golden basketball at the bottom of the stairs. Every time it touched the floor it made a tiny happy chime. Kai wanted the ball, and Leya wanted it too. For a moment they both reached for it, but Mamma gently reminded them that fun grows when people share it. So Kai took three bounces and passed the ball to Leya. Then Leya took three bounces and passed it back. Because they shared, the game felt even better. Suddenly the magical ball rolled out the door and bounced all the way to Adventure Park, where a silver hoop stood in the middle of a bright green court. A sign underneath said, Only families who listen and help one another can unlock the Hoop of Joy. Leya was excited and wanted to throw the ball straight away, but Papa said, First we slow down, aim carefully and wait our turn. Leya listened. Kai listened too. Mamma showed them how to hold the ball, bend their knees and aim gently. One by one, the shots got better. When someone missed, the others still cheered. When someone scored, everyone clapped. At last the eighth basket swished through the hoop and a warm golden light shone over the court. The prize was not gold or jewels, but a ribbon that said, Well done for sharing, listening and playing with kind hearts. Leya tied the ribbon around the magical ball so she would always remember the lesson. From that day on she knew that the best adventures are not about winning first. They are about staying close, taking turns, being kind and listening to Mamma and Papa.'};return stories[type]}
function leyaGame(){setTheme('warm');setTop('Mini-Game • Leya Story','Read a story to Leya');app.innerHTML='<section class="panel"><h2>Leya\'s Story Time</h2><p>Pick the kind of story Leya wants to hear. A longer short story will appear for Mamma to read out loud.</p><div class="choices"><button class="primary story" data-story="castle">🏰 Moonlit castle adventure</button><button class="secondary story" data-story="dog">🐶 Fluffy dog guardian adventure</button><button class="gold story" data-story="basket">🏀 Magical basketball wizard adventure</button><button class="ghost" id="exitLeya">Exit</button></div><div id="storyCard" class="panel hidden" style="margin-top:12px;background:rgba(255,255,255,.66)"></div></section>';var buttons=document.querySelectorAll('.story');for(var i=0;i<buttons.length;i++){buttons[i].onclick=function(){var type=this.getAttribute('data-story');var card=document.getElementById('storyCard');card.classList.remove('hidden');card.innerHTML='<div class="speaker">Story for Leya</div><h2 style="margin-top:4px">A little story for bedtime</h2><div class="story-card"><p>'+makeStory(type)+'</p></div>'+(type==='castle' ? '<div style="margin-top:12px">'+photoHTML('./assets/1000107354.jpg','Leya castle story photo reveal')+'</div>' : '')+(type==='dog' ? '<div style="margin-top:12px">'+photoHTML('./assets/1000114457.jpg','Leya dog story photo reveal')+'</div>' : '')+(type==='basket' ? '<div style="margin-top:12px">'+photoHTML('./assets/1000100637.jpg','Leya basketball story photo reveal')+'</div>' : '')+'<div class="btns" style="margin-top:12px"><button class="primary" id="toNagoya">Continue to the ending</button></div>';document.getElementById('toNagoya').onclick=ending}}document.getElementById('exitLeya').onclick=homeChoice}
function ending(){setTheme('ending');setTop('Final Tribute','With love from the family');app.innerHTML='<div class="cast">'+avatar('radhika')+avatar('leya')+avatar('kai')+avatar('happi')+avatar('lim')+'</div><section class="panel"><h1>To Mamma, Our Hero</h1><p>You are amazing. You are wonderful. You make life brighter, warmer, funnier and more beautiful. And most of all, you are an amazing mother to Leya and Kai.</p><p style="margin-top:10px">Love always,<br><strong>Leya, Kai, Happi and Papa Lim</strong> 💖</p><div class="btns" style="margin-top:14px"><button class="primary" id="restart">Play again</button><button class="secondary" id="reviewAllEnd">Review all photos</button></div></section>';document.getElementById('restart').onclick=intro;document.getElementById('reviewAllEnd').onclick=allPhotosReview}
intro();
